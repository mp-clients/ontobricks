<!--
    Shared cohort modals — included from both:
      - partials/ontology/_ontology_cohorts.html (design page)
      - partials/dtwin/_query_cohorts.html (run page)

    Each modal is self-contained and triggered by ``CohortModule`` calls
    (``openOutputsModal``, ``openMaterializeModal``, ``_pickSampleValue``).
    Keeping them in one place means the design and run pages stay
    structurally identical and there's no DOM drift.
-->

<!-- Modal: Configure outputs -->
<div class="modal fade" id="cohortOutputsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-sliders me-2"></i>Configure outputs</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="cohortOutputGraph" checked>
                    <label class="form-check-label" for="cohortOutputGraph">
                        <strong>Graph triples</strong>
                        <small class="text-muted d-block">
                            Writes <code id="cohortGraphPredHint">:inCohort&lt;RuleName&gt;</code> triples
                            into the knowledge graph (one membership predicate
                            per rule, so multiple rules co-exist cleanly).
                        </small>
                    </label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="cohortOutputUC">
                    <label class="form-check-label" for="cohortOutputUC">
                        <strong>Unity Catalog table</strong>
                        <small class="text-muted d-block">
                            Writes one row per (cohort, member) into a Delta
                            table. Auto-pick proposes
                            <code id="cohortUcTableHint">cohorts_&lt;rule_name&gt;</code>.
                        </small>
                    </label>
                </div>
                <div id="cohortUCConfig" class="cohort-uc-config border rounded p-3 mt-2 d-none">
                    <div class="row g-2">
                        <div class="col-md-4">
                            <label class="form-label small mb-1">Catalog</label>
                            <input type="text" class="form-control form-control-sm" id="cohortUCCatalog">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small mb-1">Schema</label>
                            <input type="text" class="form-control form-control-sm" id="cohortUCSchema">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small mb-1">Table name</label>
                            <input type="text" class="form-control form-control-sm" id="cohortUCTableName">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-sm btn-outline-secondary"
                                onclick="CohortModule.suggestUCTarget()">
                            <i class="bi bi-magic me-1"></i>Auto-pick
                        </button>
                        <button class="btn btn-sm btn-outline-secondary"
                                onclick="CohortModule.probeUCTarget()">
                            <i class="bi bi-shield-check me-1"></i>Test write access
                        </button>
                    </div>
                    <div id="cohortUCProbeResult" class="mt-2 small"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-sm btn-primary" onclick="CohortModule.saveOutputs()">
                    <i class="bi bi-check2 me-1"></i>Save outputs
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Materialise confirmation -->
<div class="modal fade" id="cohortMaterializeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-cloud-upload me-2"></i>Materialise cohorts</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="cohortMaterializeBody"></div>
            <div class="modal-footer">
                <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-sm btn-success" onclick="CohortModule.materialize()">
                    <i class="bi bi-cloud-upload me-1"></i>Materialise now
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Pick a sample value (used by where + compatibility "equal to" rows) -->
<div class="modal fade" id="cohortSampleValuesModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-list-ul me-2"></i>Pick a value
                </h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="cohort-sample-meta small text-muted mb-2"
                     id="cohortSampleValuesMeta"></div>
                <div class="input-group input-group-sm mb-2">
                    <span class="input-group-text">
                        <i class="bi bi-funnel"></i>
                    </span>
                    <input type="text" class="form-control form-control-sm"
                           id="cohortSampleValuesFilter"
                           placeholder="Filter values…">
                </div>
                <div class="cohort-sample-values-list list-group list-group-flush"
                     id="cohortSampleValuesList"></div>
                <div class="mt-3">
                    <label class="form-label small mb-1"
                           for="cohortSampleValuesCustom">
                        Or enter a custom value
                    </label>
                    <input type="text" class="form-control form-control-sm"
                           id="cohortSampleValuesCustom"
                           placeholder="Type a value…">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-sm btn-outline-secondary"
                        data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-sm btn-primary"
                        id="cohortSampleValuesApplyBtn">
                    <i class="bi bi-check2 me-1"></i>Apply
                </button>
            </div>
        </div>
    </div>
</div>
